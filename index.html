<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>

<div class="card" id="card">
  <div class="profile-effect" id="profileEffect"></div>
  <div class="banner" id="banner">
    <div class="banner-grid"></div>
    <div class="banner-img" id="bannerImg"></div>
  </div>
  <div class="av-row">
    <div class="av-ring">
      <div class="av-fallback" id="avatarEl">…</div>
      <div class="av-status" title="Online"></div>
    </div>
  </div>
  <div class="body" id="cardBody">
    <div id="skeleton">
      <div class="skeleton sk-name"></div>
      <div class="skeleton sk-handle"></div>
      <div class="skeleton sk-pill"></div>
    </div>
    <div class="rule" style="opacity:0" id="r1"></div>
    <div id="nameplateSection"></div>
    <div id="bioSection" style="opacity:0">
      <div class="lbl">About Me</div>
      <div class="skeleton sk-bio" id="bioSkeleton"></div>
    </div>
    <div class="rule" style="opacity:0" id="r2"></div>
    <div id="activitySection" style="opacity:0"></div>
    <div class="rule" style="opacity:0" id="r3"></div>
    <div id="idSection" style="opacity:0">
      <div class="id-block" onclick="copyId()">
        <div>
          <div class="id-lbl">Discord ID</div>
          <div class="id-val" id="idVal">1331780207979401289</div>
        </div>
        <div class="copy-btn" id="copyLbl">Copy</div>
      </div>
    </div>
  </div>
</div>

<div class="toggle-wrap">
  <button class="toggle-btn" onclick="toggleTheme()">
    <span class="t-icon" id="tIcon">🌙</span>
    <div class="t-track"><div class="t-thumb"></div></div>
    <span id="tLabel">Light mode</span>
  </button>
</div>

<div class="effect-wrap">
  <div class="effect-slider-box">
    <label class="effect-slider-label" for="effectSlider">Effect <span id="effectSliderVal">100</span>%</label>
    <input class="effect-slider" type="range" id="effectSlider" min="0" max="100" value="100"
      oninput="setEffectOpacity(this.value)">
  </div>
</div>

<script>
  const API = "https://soft-forest-a8c2.cozyine.workers.dev";
  const STATUS_LABEL = { online:"Online", idle:"Idle", dnd:"Do Not Disturb", offline:"Offline" };
  const root = document.documentElement;
  let dark = localStorage.getItem("theme") !== "light";
  applyTheme();

  function toggleTheme() { dark=!dark; localStorage.setItem("theme",dark?"dark":"light"); applyTheme(); }
  function applyTheme() {
    root.setAttribute("data-theme", dark?"dark":"light");
    document.getElementById("tIcon").textContent  = dark?"🌙":"☀️";
    document.getElementById("tLabel").textContent = dark?"Light mode":"Dark mode";
  }

  function setEffectOpacity(val) {
    document.getElementById("effectSliderVal").textContent = val;
    const el = document.getElementById("profileEffect");
    if (el) el.style.opacity = val / 100;
    localStorage.setItem("effectOpacity", val);
  }
  (function() {
    const saved = localStorage.getItem("effectOpacity");
    if (saved !== null) {
      const slider = document.getElementById("effectSlider");
      if (slider) { slider.value = saved; setEffectOpacity(saved); }
    }
  })();

  function copyId() {
    navigator.clipboard.writeText(document.getElementById("idVal").textContent).then(() => {
      const btn = document.getElementById("copyLbl");
      btn.textContent="Copied!"; btn.classList.add("ok");
      setTimeout(()=>{btn.textContent="Copy";btn.classList.remove("ok")},2000);
    });
  }

  // ── Effects DB ─────────────────────────────────────────────────────────────
  let EFFECTS_DB = {};
  const effectsDbReady = fetch("effects_db.json")
    .then(r => r.json())
    .then(data => { EFFECTS_DB = data; })
    .catch(e => console.warn("Could not load effects_db.json:", e));

  // ── Effect rendering ────────────────────────────────────────────────────────
  async function renderEffect(effectId, effectEl) {
    effectEl.innerHTML = "";
    const effect = EFFECTS_DB[effectId];
    if (!effect) { console.warn("Unknown effect ID:", effectId); return; }

    const startupDur  = effect.startupDuration || 3000;
    const remainDur   = effect.remainDuration  || 3000;
    const interval    = effect.remainInterval  || 5000;
    const deleteStart = effect.deleteStartupAfterFinish === true;
    const autoLoop    = effect.discordAutoLoop === true;
    console.log(`[effect] id=${effectId} startupDur=${startupDur}ms remainDur=${remainDur}ms interval=${interval}ms autoLoop=${autoLoop}`);

    const makeImg = (src, zIndex) => {
      const img = document.createElement("img");
      img.src = src;
      img.style.cssText = `position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;pointer-events:none;z-index:${zIndex}`;
      return img;
    };

    const proxy      = (src) => `${API}/proxy-apng?src=${encodeURIComponent(src)}`;
    const proxyFresh = (src) => `${API}/proxy-apng?src=${encodeURIComponent(src)}&t=${Date.now()}`;

    if (autoLoop) {
      const startImg = makeImg(effect.startup, 101);
      effectEl.appendChild(startImg);
      if (deleteStart) setTimeout(() => startImg.remove(), startupDur + 200);
      const remainImg = makeImg(effect.remain, 102);
      remainImg.style.opacity = "0";
      effectEl.appendChild(remainImg);
      setTimeout(() => {
        remainImg.style.transition = "opacity 0.2s";
        remainImg.style.opacity = "1";
      }, startupDur);
      return;
    }

    const startImg = makeImg(proxy(effect.startup), 101);
    effectEl.appendChild(startImg);
    if (deleteStart) setTimeout(() => startImg.remove(), startupDur + 200);

    const playRemain = () => {
      const remainImg = makeImg(proxyFresh(effect.remain), 102);
      remainImg.style.opacity = "0";
      effectEl.appendChild(remainImg);
      requestAnimationFrame(() => {
        remainImg.style.transition = "opacity 0.2s";
        remainImg.style.opacity = "1";
      });
      setTimeout(() => {
        remainImg.style.transition = "opacity 0.2s";
        remainImg.style.opacity = "0";
        setTimeout(() => {
          remainImg.remove();
          setTimeout(playRemain, interval);
        }, 200);
      }, remainDur);
    };

    setTimeout(playRemain, startupDur);
  }

  async function loadProfile() {
    try {
      const res = await fetch(`${API}/all`);
      if (!res.ok) throw new Error(`API error ${res.status}`);
      renderProfile(await res.json());
    } catch(err) { renderError(err.message); }
  }

  function renderProfile(p) {
    const status   = p.status   || "offline";
    const activity = p.activity || null;

    // Avatar
    const avEl = document.getElementById("avatarEl");
    if (avEl) {
      const img = document.createElement("img");
      img.className = "av-img"; img.alt = "avatar";
      img.onerror = () => {
        const fb = document.createElement("div");
        fb.className = "av-fallback";
        fb.textContent = (p.displayName[0]||"?").toUpperCase();
        img.replaceWith(fb);
      };
      img.src = p.avatarUrl;
      avEl.replaceWith(img);
    } else {
      const existing = document.querySelector(".av-img");
      if (existing && existing.src !== p.avatarUrl) existing.src = p.avatarUrl;
    }

    // Avatar decoration
    const ring = document.querySelector(".av-ring");
    if (ring) {
      const ex = ring.querySelector(".av-decoration");
      if (p.decorationUrl) {
        if (ex) { ex.src = p.decorationUrl; }
        else {
          const dec = document.createElement("img");
          dec.className = "av-decoration"; dec.src = p.decorationUrl; dec.alt = "";
          ring.appendChild(dec);
        }
      } else if (ex) { ex.remove(); }
    }

    // Status dot
    const dot = document.querySelector(".av-status");
    dot.className = `av-status ${status}`;
    dot.title = STATUS_LABEL[status]||status;

    // Banner
    if (p.bannerUrl) {
      const bi = document.getElementById("bannerImg");
      bi.style.backgroundImage = `url(${p.bannerUrl})`;
      bi.classList.add("loaded");
    } else if (p.accentColor) {
      document.getElementById("banner").style.background = p.accentColor;
    }

    // Profile effect
    const rawEffect = p.effectUrl ? String(p.effectUrl) : null;
    const effectId = rawEffect?.match(/profile-effects\/(\d+)\//)?.[1]
      || rawEffect?.match(/^(\d+)$/)?.[1]
      || null;
    const effectEl = document.getElementById("profileEffect");
    const prevEffectId = effectEl.dataset.effectId;
    if (effectId && effectId !== prevEffectId) {
      effectEl.dataset.effectId = effectId;
      renderEffect(effectId, effectEl);
    }

    // Clan tag
    const clanHtml = p.clanTag
      ? ` <span class="clan-tag">${p.clanBadgeUrl?`<img src="${escHtml(p.clanBadgeUrl)}" alt="">`:""}${escHtml(p.clanTag)}</span>`
      : "";

    // Inline badge icons
    const badgeIconsHtml = p.badges?.length
      ? `<div class="badge-icons">${p.badges.map(b => b.iconUrl
          ? `<img src="${escHtml(b.iconUrl)}" title="${escHtml(b.label||'')}" alt="${escHtml(b.label||'')}" onerror="this.style.display='none'">`
          : "").filter(Boolean).join("")}</div>`
      : "";

    // Name / handle / status pill / badges
    document.getElementById("skeleton").innerHTML = `
      <div>
        <div class="dname">${escHtml(p.displayName)}${clanHtml}</div>
        <div class="handle">@<em>${escHtml(p.username)}</em>${p.pronouns?` · <span style="color:var(--text3);font-size:12px">${escHtml(p.pronouns)}</span>`:""}</div>
        <div class="online-pill ${status}"><span class="odot ${status}"></span>${escHtml(STATUS_LABEL[status]||status)}</div>
        ${badgeIconsHtml}
      </div>`;

    // Nameplate bar
    const npSec = document.getElementById("nameplateSection");
    console.log('[renderProfile] Nameplate data:', { 
      nameplateAnimatedUrl: p.nameplateAnimatedUrl, 
      nameplateUrl: p.nameplateUrl,
      accentColor: p.accentColor 
    });
    
    const npClan = p.clanTag
      ? `<span class="np-clan">${p.clanBadgeUrl?`<img src="${escHtml(p.clanBadgeUrl)}" alt="">`:""}${escHtml(p.clanTag)}</span>`
      : "";
    const actIcon = activity?.largeImage ? `<img src="${escHtml(activity.largeImage)}" alt="">` : "🎮";
    const npAct = activity?.name
      ? `<span class="np-activity">${actIcon} ${escHtml(activity.name)}</span>` : "";

    if (p.nameplateAnimatedUrl || p.nameplateUrl) {
      const isVideo = !!p.nameplateAnimatedUrl;
      const accentDark = p.accentColor ? p.accentColor + "80" : "rgba(0,0,0,.5)";
      const npUrl = isVideo ? p.nameplateAnimatedUrl : p.nameplateUrl;
      const proxiedNpUrl = `${API}/proxy-apng?src=${encodeURIComponent(npUrl)}`;
      
      npSec.innerHTML = `
        <div class="nameplate-bar" id="nameplateBar">
          ${isVideo
            ? `<video autoplay loop muted playsinline crossorigin="anonymous"><source src="${escHtml(proxiedNpUrl)}" type="video/webm"></video>`
            : `<img class="np-bg" src="${escHtml(proxiedNpUrl)}" alt="" crossorigin="anonymous">`}
          <div class="np-overlay" style="--np-accent:${accentDark}"></div>
          <div class="np-content">
            <div class="np-row1">
              <img class="np-avatar" src="${escHtml(p.avatarUrl)}" alt="">
              <span class="np-name">${escHtml(p.displayName)}</span>
              ${npClan}
            </div>
            ${npAct ? `<div class="np-row2">${npAct}</div>` : ""}
          </div>
        </div>`;
      
      console.log('[renderProfile] Nameplate HTML inserted, isVideo:', isVideo, 'proxiedUrl:', proxiedNpUrl);
      
      // Attach color extraction after element is rendered
      if (isVideo) {
        // For video, sample color as soon as video data is loaded
        setTimeout(() => {
          const videoEl = document.querySelector('#nameplateBar video');
          console.log('[renderProfile] Found video element:', videoEl);
          if (videoEl) {
            extractColorFromVideo(videoEl);
          }
        }, 200);
      } else {
        setTimeout(() => {
          const npImg = document.querySelector('#nameplateBar img.np-bg');
          console.log('[renderProfile] Found img element:', npImg);
          if (npImg) {
            console.log('[renderProfile] Image complete:', npImg.complete, 'src:', npImg.src);
            if (npImg.complete) {
              console.log('[renderProfile] Image already loaded, extracting color now');
              extractNameplateColor(npImg);
            } else {
              console.log('[renderProfile] Image not loaded yet, attaching onload handler');
              npImg.onload = () => {
                console.log('[renderProfile] Image onload triggered');
                extractNameplateColor(npImg);
              };
              npImg.onerror = (e) => {
                console.error('[renderProfile] Image onerror:', e);
              };
            }
          }
        }, 100);
      }
    } else if (p.accentColor) {
      // No nameplate image, use accent color as full-width background
      console.log('[renderProfile] No nameplate image, using accent color:', p.accentColor);
      npSec.innerHTML = `
        <div class="nameplate-bar nameplate-solid" style="background:${p.accentColor}">
          <div class="np-content">
            <div class="np-row1">
              <img class="np-avatar" src="${escHtml(p.avatarUrl)}" alt="">
              <span class="np-name">${escHtml(p.displayName)}</span>
              ${npClan}
            </div>
            ${npAct ? `<div class="np-row2">${npAct}</div>` : ""}
          </div>
        </div>`;
    } else {
      console.log('[renderProfile] No nameplate image and no accent color');
      npSec.innerHTML = "";
    }

    // Bio
    const bioSec = document.getElementById("bioSection");
    bioSec.innerHTML = `
      <div class="lbl">About Me</div>
      ${p.bio
        ? `<p class="bio-text" style="white-space:pre-line">${escHtml(p.bio)}</p>`
        : `<p class="no-bio">This user prefers to keep an air of mystery.</p>`}`;
    bioSec.style.opacity = "1";

    // Activity
    const actSec = document.getElementById("activitySection");
    if (activity) {
      const typeIcon = {spotify:"🎵",playing:"🎮",streaming:"📡",watching:"📺",competing:"🏆",custom:"✨"}[activity.type]||"💻";
      const elapsed = activity.start ? formatElapsed(activity.start) : null;
      actSec.innerHTML = `
        <div class="lbl">Current Activity</div>
        <div class="activity-card">
          <div class="activity-icon">
            ${activity.largeImage
              ? `<img class="large" src="${escHtml(activity.largeImage)}" alt="activity">${activity.smallImage?`<img class="small" src="${escHtml(activity.smallImage)}" alt="" title="${escHtml(activity.smallText||'')}">`:""}`
              : typeIcon}
          </div>
          <div style="min-width:0;flex:1">
            <div class="activity-name">${escHtml(activity.name)}</div>
            ${activity.details?`<div class="activity-detail">${escHtml(activity.details)}</div>`:""}
            ${activity.state?`<div class="activity-detail">${escHtml(activity.state)}</div>`:""}
            ${elapsed?`<div class="activity-detail" id="actElapsed">${elapsed}</div>`:""}
            ${activity.buttons?.filter(b=>b.url).length?`
              <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
                ${activity.buttons.filter(b=>b.url).map(b=>`<a href="${escHtml(b.url)}" target="_blank" rel="noopener" class="act-btn">${escHtml(b.label)}</a>`).join("")}
              </div>`:""}
          </div>
        </div>`;
      actSec.style.opacity = "1";
      document.getElementById("r2").style.opacity = "1";
      document.getElementById("r3").style.opacity = "1";
      if (activity.start) {
        clearInterval(window._elapsedTimer);
        window._elapsedTimer = setInterval(()=>{
          const el = document.getElementById("actElapsed");
          if (el) el.textContent = formatElapsed(activity.start);
        }, 1000);
      }
    } else {
      actSec.innerHTML = ""; actSec.style.opacity = "0";
      document.getElementById("r2").style.opacity = "0";
      document.getElementById("r3").style.opacity = "1";
      clearInterval(window._elapsedTimer);
    }

    document.getElementById("idVal").textContent = p.id;
    document.getElementById("r1").style.opacity  = "1";
    document.getElementById("idSection").style.opacity = "1";
  }

  function renderError(msg) {
    document.getElementById("skeleton").innerHTML = `
      <div class="error-box">⚠️ Couldn't load profile.<br>
      <span style="font-size:12px;opacity:.8">${escHtml(msg)}</span></div>`;
    document.getElementById("r2").style.opacity = "1";
    document.getElementById("idSection").style.opacity = "1";
  }

  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function formatElapsed(startMs) {
    const diff=Math.floor((Date.now()-startMs)/1000);
    const h=Math.floor(diff/3600),m=Math.floor((diff%3600)/60),s=diff%60;
    const pad=n=>String(n).padStart(2,"0");
    return h>0?`${pad(h)}:${pad(m)}:${pad(s)} elapsed`:`${pad(m)}:${pad(s)} elapsed`;
  }

  // Extract dominant color from nameplate image and apply as darkened background
  function extractNameplateColor(img) {
    console.log('[extractNameplateColor] Starting...', img.src);
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    canvas.width = img.naturalWidth || img.width;
    canvas.height = img.naturalHeight || img.height;
    
    console.log('[extractNameplateColor] Canvas size:', canvas.width, 'x', canvas.height);
    
    if (canvas.width === 0 || canvas.height === 0) {
      console.warn('[extractNameplateColor] Invalid image dimensions');
      return;
    }
    
    try {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    } catch (e) {
      console.error('[extractNameplateColor] Failed to draw image:', e);
      return;
    }
    
    // Sample pixels from the center area
    const sampleSize = 10;
    const startX = Math.floor((canvas.width - sampleSize) / 2);
    const startY = Math.floor((canvas.height - sampleSize) / 2);
    
    let r = 0, g = 0, b = 0, count = 0;
    
    for (let y = startY; y < startY + sampleSize && y < canvas.height; y += 2) {
      for (let x = startX; x < startX + sampleSize && x < canvas.width; x += 2) {
        try {
          const pixel = ctx.getImageData(x, y, 1, 1).data;
          r += pixel[0];
          g += pixel[1];
          b += pixel[2];
          count++;
        } catch (e) {
          console.warn('[extractNameplateColor] Could not read pixel:', e);
          return;
        }
      }
    }
    
    if (count === 0) return;
    
    r = Math.round(r / count);
    g = Math.round(g / count);
    b = Math.round(b / count);
    
    console.log('[extractNameplateColor] Extracted RGB:', r, g, b);

    // Keep 30% brightness (70% darker)
    r = Math.floor(r * 0.5);
    g = Math.floor(g * 0.5);
    b = Math.floor(b * 0.5);

    console.log('[extractNameplateColor] Darkened RGB:', r, g, b);
    
    const nameplateBar = document.getElementById('nameplateBar');
    if (nameplateBar) {
      const bgColor = `rgb(${r}, ${g}, ${b})`;
      // Gradient: transparent on left, solid color on right
      nameplateBar.style.background = `linear-gradient(to right, transparent 0%, ${bgColor} 40%, ${bgColor} 100%)`;
      console.log('[extractNameplateColor] Applied background:', bgColor);
    } else {
      console.warn('[extractNameplateColor] nameplateBar not found');
    }
  }

  // Extract dominant color from video frame and apply as darkened background
  function extractColorFromVideo(video) {
    console.log('[extractColorFromVideo] Starting...', video.src || video.querySelector('source')?.src);
    
    // Wait for video to be playing
    if (video.readyState < 2) {
      console.log('[extractColorFromVideo] Video not ready, waiting...');
      video.onloadeddata = () => extractColorFromVideo(video);
      return;
    }
    
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    canvas.width = video.videoWidth || 448;
    canvas.height = video.videoHeight || 84;
    
    console.log('[extractColorFromVideo] Canvas size:', canvas.width, 'x', canvas.height);
    
    if (canvas.width === 0 || canvas.height === 0) {
      console.warn('[extractColorFromVideo] Invalid video dimensions, retrying...');
      setTimeout(() => extractColorFromVideo(video), 500);
      return;
    }
    
    try {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    } catch (e) {
      console.error('[extractColorFromVideo] Failed to draw video frame:', e);
      // Fallback: try to get color from the static image URL instead
      const staticImg = document.createElement('img');
      staticImg.crossOrigin = 'anonymous';
      const staticUrl = video.querySelector('source')?.src?.replace('/asset.webm', '/static.png');
      console.log('[extractColorFromVideo] Falling back to static image:', staticUrl);
      if (staticUrl) {
        staticImg.onload = () => extractNameplateColor(staticImg);
        staticImg.src = staticUrl;
      }
      return;
    }
    
    // Sample pixels from the center area
    const sampleSize = 20;
    const startX = Math.floor((canvas.width - sampleSize) / 2);
    const startY = Math.floor((canvas.height - sampleSize) / 2);
    
    let r = 0, g = 0, b = 0, count = 0;
    
    for (let y = startY; y < startY + sampleSize && y < canvas.height; y += 4) {
      for (let x = startX; x < startX + sampleSize && x < canvas.width; x += 4) {
        try {
          const pixel = ctx.getImageData(x, y, 1, 1).data;
          r += pixel[0];
          g += pixel[1];
          b += pixel[2];
          count++;
        } catch (e) {
          console.warn('[extractColorFromVideo] Could not read pixel:', e);
          // Fallback to static image
          const staticImg = document.createElement('img');
          staticImg.crossOrigin = 'anonymous';
          const staticUrl = video.querySelector('source')?.src?.replace('/asset.webm', '/static.png');
          console.log('[extractColorFromVideo] Falling back to static image:', staticUrl);
          if (staticUrl) {
            staticImg.onload = () => extractNameplateColor(staticImg);
            staticImg.src = staticUrl;
          }
          return;
        }
      }
    }
    
    if (count === 0) return;
    
    r = Math.round(r / count);
    g = Math.round(g / count);
    b = Math.round(b / count);
    
    console.log('[extractColorFromVideo] Extracted RGB:', r, g, b);

    // Keep 30% brightness (70% darker)
    r = Math.floor(r * 0.3);
    g = Math.floor(g * 0.3);
    b = Math.floor(b * 0.3);

    console.log('[extractColorFromVideo] Darkened RGB:', r, g, b);

    const nameplateBar = document.getElementById('nameplateBar');
    if (nameplateBar) {
      const bgColor = `rgb(${r}, ${g}, ${b})`;
      // Gradient: transparent on left, solid color on right
      nameplateBar.style.background = `linear-gradient(to right, transparent 0%, ${bgColor} 40%, ${bgColor} 100%)`;
      console.log('[extractColorFromVideo] Applied background:', bgColor);
    } else {
      console.warn('[extractColorFromVideo] nameplateBar not found');
    }
  }

  effectsDbReady.then(() => {
    loadProfile();
    setInterval(loadProfile, 60_000);
  });
</script>
</body>
</html>
